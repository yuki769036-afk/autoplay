<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AutoPlay">
  <meta name="theme-color" content="#0a0a0a">
  <title>AutoPlay</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --border: #222;
      --text: #f0ede8; --muted: #555; --accent: #e8ff47; --red: #ff4747; --green: #47ff8a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    body.light {
      --bg: #f4f4f0; --surface: #eaeae6; --border: #d8d8d4;
      --text: #1a1a1a; --muted: #999; --accent: #1a1a1a; --red: #d63232; --green: #1a7a4a;
    }
    body.light .logo span { color: #555; }
    body.light .now-hero-bg { filter: blur(32px) brightness(0.7) saturate(1.2); }
    body.light .now-url-text { color: rgba(0,0,0,0.4); }
    body.light .ctrl-btn { background: rgba(0,0,0,0.08); color: #1a1a1a; }
    body.light .ctrl-btn.primary { background: #1a1a1a; color: #fff; }
    .theme-btn {
      background: none; border: 1px solid var(--border); border-radius: 100px;
      padding: 4px 10px; cursor: pointer; font-size: 0.75rem;
      -webkit-tap-highlight-color: transparent; transition: all 0.2s; color: var(--muted);
    }
    .theme-btn:active { border-color: var(--accent); }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; flex-direction: column;
      padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
      -webkit-font-smoothing: antialiased;
      transition: background-color 1.8s ease;
    }

    /* ── Header ── */
    header {
      padding: 18px 20px 13px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .status-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .mode-toggle {
      font-size: 0.65rem; font-family: 'Syne Mono', monospace;
      border: 1px solid var(--border); border-radius: 100px;
      padding: 4px 12px; cursor: pointer; background: none; color: var(--muted);
      -webkit-tap-highlight-color: transparent; transition: all 0.2s;
    }
    .mode-toggle.receiver { color: var(--green); border-color: var(--green); }

    /* ── Tabs ── */
    .tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab {
      flex: 1; padding: 11px 6px; text-align: center;
      font-size: 0.65rem; font-family: 'Syne Mono', monospace;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; border: none;
      background: none; -webkit-tap-highlight-color: transparent;
      border-bottom: 2px solid transparent; transition: color 0.2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab[data-receiver] { display: none; }

    .panel { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
    .panel.active { display: flex; }

    .section-title {
      font-size: 0.62rem; font-family: 'Syne Mono', monospace; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
    }

    /* ── RECEIVER PANEL ── */
    .receiver-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* Spotify hero */
    .now-hero {
      position: relative; flex-shrink: 0;
      background: #111; overflow: hidden;
    }
    .now-hero-bg {
      position: absolute; inset: -30px;
      background-size: cover; background-position: center;
      filter: blur(32px) brightness(0.35) saturate(1.6);
      transition: background-image 0.8s ease;
    }
    .now-hero-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 20px 18px; gap: 14px;
    }
    .now-art {
      width: 180px; height: 180px; border-radius: 12px;
      overflow: hidden; background: #1a1a1a;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1),
                  height 0.6s cubic-bezier(0.34,1.56,0.64,1),
                  border-radius 0.6s ease,
                  box-shadow 0.6s ease;
    }
    .now-art.playing {
      width: 260px; height: 260px;
      border-radius: 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.85);
    }
    .now-art img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .now-art-empty { color: #333; }
    .now-meta { text-align: center; width: 100%; }
    .now-status {
      font-size: 0.6rem; font-family: 'Syne Mono', monospace;
      letter-spacing: 0.14em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-bottom: 6px; color: var(--accent);
    }
    .now-status.idle { color: var(--muted); }
    .playing-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: pdot 1.2s ease-in-out infinite;
    }
    .now-status.idle .playing-dot { animation: none; background: var(--muted); }
    @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:0.15} }
    .now-url-text {
      font-family: 'Syne Mono', monospace; font-size: 0.68rem;
      color: rgba(255,255,255,0.45); word-break: break-all; line-height: 1.5; padding: 0 4px;
    }
    /* Controls */
    .now-controls { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 4px; }
    .ctrl-btn {
      background: rgba(255,255,255,0.1); border: none; border-radius: 50%;
      width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.15s;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.91); }
    .ctrl-btn.primary { background: var(--accent); color: #000; width: 56px; height: 56px; }
    .ctrl-btn.primary:active { opacity: 0.8; transform: scale(0.93); }

    /* iframe player */
    .yt-player {
      display: none; width: 100%; aspect-ratio: 16/9;
      background: #000; flex-shrink: 0;
    }
    .yt-player iframe { width: 100%; height: 100%; border: none; }

    /* Queue section */
    .queue-section { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .queue-header { display: flex; align-items: center; justify-content: space-between; }
    .queue-count { font-size: 0.65rem; font-family: 'Syne Mono', monospace; color: var(--accent); }
    .clear-btn { font-size: 0.65rem; font-family: 'Syne Mono', monospace; color: var(--red); background: none; border: none; cursor: pointer; }
    .queue-list { display: flex; flex-direction: column; gap: 8px; }
    .queue-empty { color: var(--muted); font-size: 0.8rem; padding: 16px 0; text-align: center; }
    .queue-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .queue-item.current { border-color: var(--accent); }
    .queue-num { font-family: 'Syne Mono', monospace; font-size: 0.7rem; color: var(--muted); flex-shrink: 0; width: 16px; text-align: center; }
    .queue-item.current .queue-num { color: var(--accent); }
    .q-thumb { width: 52px; height: 37px; border-radius: 4px; background: var(--border); overflow: hidden; flex-shrink: 0; }
    .q-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .q-info { flex: 1; min-width: 0; }
    .q-url { font-family: 'Syne Mono', monospace; font-size: 0.66rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .queue-item.current .q-url { color: var(--text); }
    .q-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .q-play-btn { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 6px 10px; font-weight: 800; font-size: 0.72rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .q-play-btn:active { opacity: 0.7; }
    .q-del-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 6px 8px; font-size: 0.7rem; -webkit-tap-highlight-color: transparent; }

    /* QR card */
    .qr-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .qr-inner { background: #fff; border-radius: 8px; padding: 10px; }
    #qrcode { width: 140px; height: 140px; }
    #qrcode img, #qrcode canvas { width: 140px !important; height: 140px !important; }
    .qr-label { font-size: 0.65rem; font-family: 'Syne Mono', monospace; color: var(--muted); letter-spacing: 0.08em; }

    .shuffle-btn {
      font-size: 0.7rem; font-family: 'Syne Mono', monospace;
      background: none; border: 1px solid var(--border); border-radius: 100px;
      color: var(--muted); padding: 4px 12px; cursor: pointer;
      -webkit-tap-highlight-color: transparent; transition: all 0.2s;
    }
    .shuffle-btn:active { border-color: var(--accent); color: var(--accent); }
    .shuffle-btn.active { border-color: var(--accent); color: var(--accent); }

    /* ── SEND PANEL ── */
    .send-panel { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    .url-input {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Syne Mono', monospace; font-size: 0.8rem;
      padding: 13px 14px; outline: none; -webkit-appearance: none; width: 100%;
      transition: border-color 0.2s; margin-bottom: 8px;
    }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); }
    .send-btn {
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 14px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent; width: 100%;
      transition: opacity 0.15s, transform 0.15s;
    }
    .send-btn:active { opacity: 0.7; transform: scale(0.97); }

    /* ── PLAYLIST PANEL ── */
    .playlist-panel { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .cat-tab {
      font-size: 0.7rem; font-family: 'Syne Mono', monospace;
      padding: 5px 12px; border-radius: 100px;
      border: 1px solid var(--border); color: var(--muted);
      cursor: pointer; background: none; -webkit-tap-highlight-color: transparent;
      transition: all 0.15s; white-space: nowrap;
    }
    .cat-tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
    .song-list { display: flex; flex-direction: column; gap: 8px; }
    .song-empty { color: var(--muted); font-size: 0.8rem; padding: 24px 0; text-align: center; }
    .song-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 13px;
      display: flex; align-items: center; gap: 11px;
    }
    .song-item.kicking { animation: kickFlash 0.4s ease; }
    @keyframes kickFlash { 0%{background:rgba(232,255,71,0.15);border-color:var(--accent)} 100%{background:var(--surface);border-color:var(--border)} }
    .song-thumb { width: 56px; height: 40px; border-radius: 5px; background: var(--border); overflow: hidden; flex-shrink: 0; }
    .song-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .song-info { flex: 1; min-width: 0; }
    .song-cat { font-size: 0.6rem; font-family: 'Syne Mono', monospace; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
    .song-url { font-family: 'Syne Mono', monospace; font-size: 0.67rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .kick-btn {
      background: var(--accent); color: #000; border: none; border-radius: 7px;
      padding: 7px 13px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.8rem;
      cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.15s;
    }
    .kick-btn:active { opacity: 0.7; transform: scale(0.93); }
    .del-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); cursor: pointer; padding: 6px 9px; font-size: 0.72rem;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── MANAGE PANEL ── */
    .manage-panel { padding: 16px; display: flex; flex-direction: column; gap: 20px; }
    .add-form { display: flex; flex-direction: column; gap: 8px; }
    .reg-input {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Syne Mono', monospace; font-size: 0.78rem;
      padding: 11px 12px; outline: none; -webkit-appearance: none; width: 100%;
      transition: border-color 0.2s;
    }
    .reg-input::placeholder { color: var(--muted); }
    .reg-input:focus { border-color: var(--accent); }
    .add-btn {
      background: var(--surface); color: var(--accent);
      border: 1px solid rgba(232,255,71,0.3); border-radius: 8px;
      padding: 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { background: rgba(232,255,71,0.08); }

    /* ── Driving Mode ── */
    body.driving header,
    body.driving .tabs { display: none !important; }
    body.driving .panel { display: none !important; }
    body.driving #panel-receiver { display: flex !important; }
    body.driving .receiver-panel { justify-content: center; }
    body.driving .now-art.playing { width: 260px; height: 260px; }
    body.driving .now-hero-content { gap: 20px; padding: 20px 20px 16px; }
    body.driving .now-controls { gap: 20px; margin-top: 8px; }
    /* 前の曲・次の曲ボタン */
    body.driving .ctrl-btn { width: 80px; height: 80px; border-radius: 50%; }
    body.driving .ctrl-btn svg { transform: scale(1.6); }
    /* 再生/停止ボタン */
    body.driving .ctrl-btn.primary { width: 100px; height: 100px; }
    body.driving .ctrl-btn.primary svg { transform: scale(1.9); }
    body.driving .now-url-text { font-size: 0.78rem; }
    body.driving .now-status { font-size: 0.72rem; }
    body.driving .queue-section { display: none; }
    /* 再度開く・削除ボタンは小さく */
    body.driving .ctrl-btn:not(.primary):first-child,
    body.driving .ctrl-btn:not(.primary):last-child { width: 56px; height: 56px; opacity: 0.6; }
    .drive-bar {
      display: none; background: var(--surface); border-top: 1px solid var(--border);
      padding: 10px 20px; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    body.driving .drive-bar { display: flex; }
    .drive-exit {
      font-size: 0.7rem; font-family: 'Syne Mono', monospace; color: var(--muted);
      background: none; border: 1px solid var(--border); border-radius: 100px;
      padding: 6px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .next-up {
      display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; margin-right: 12px;
    }
    .next-thumb { width: 36px; height: 26px; border-radius: 4px; background: var(--border); overflow: hidden; flex-shrink: 0; }
    .next-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .next-info { min-width: 0; }
    .next-label { font-size: 0.55rem; font-family: 'Syne Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .next-url { font-family: 'Syne Mono', monospace; font-size: 0.62rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Next up preview in hero ── */
    .next-preview {
      display: none; width: 100%; padding: 0 4px;
      align-items: center; gap: 8px;
    }
    .next-preview.visible { display: flex; }
    .next-preview-thumb { width: 32px; height: 23px; border-radius: 3px; background: var(--border); overflow: hidden; flex-shrink: 0; }
    .next-preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .next-preview-text { font-family: 'Syne Mono', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.4); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .next-preview-label { font-size: 0.55rem; color: rgba(255,255,255,0.25); margin-right: 4px; flex-shrink: 0; }

    /* ── History tab ── */
    .history-panel { padding: 16px; display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }
    .history-empty { color: var(--muted); font-size: 0.8rem; padding: 24px 0; text-align: center; }
    .history-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .h-thumb { width: 56px; height: 40px; border-radius: 5px; background: var(--border); overflow: hidden; flex-shrink: 0; }
    .h-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .h-info { flex: 1; min-width: 0; }
    .h-time { font-size: 0.58rem; font-family: 'Syne Mono', monospace; color: var(--muted); margin-bottom: 2px; }
    .h-url { font-family: 'Syne Mono', monospace; font-size: 0.67rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-add-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); cursor: pointer; padding: 6px 10px; font-size: 0.72rem;
      flex-shrink: 0; -webkit-tap-highlight-color: transparent;
    }
    .h-add-btn:active { border-color: var(--accent); color: var(--accent); }

    /* Queue drag reorder */
    .queue-item { cursor: grab; user-select: none; }
    .queue-item.dragging { opacity: 0.4; border-style: dashed; }
    .queue-item.drag-over { border-color: var(--accent); background: rgba(232,255,71,0.05); }

    /* ── Save Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 24px 20px 32px;
      width: 100%; max-width: 480px;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
      display: flex; flex-direction: column; gap: 12px;
    }
    .modal-overlay.show .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 100px; margin: 0 auto 8px; }
    .modal-title { font-size: 0.7rem; font-family: 'Syne Mono', monospace; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .modal-input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: 'Syne Mono', monospace; font-size: 0.82rem;
      padding: 12px 14px; outline: none; -webkit-appearance: none; width: 100%;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-url { font-family: 'Syne Mono', monospace; font-size: 0.65rem; color: var(--muted); word-break: break-all; line-height: 1.5; }
    .modal-actions { display: flex; gap: 8px; }
    .modal-save {
      flex: 1; background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 13px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.9rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .modal-cancel {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); padding: 13px 18px; font-family: 'Syne', sans-serif;
      font-size: 0.85rem; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }

    /* ── Swipe hint ── */
    .swipe-hint {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 2rem; opacity: 0; pointer-events: none; transition: opacity 0.15s;
      z-index: 10;
    }
    .now-hero { position: relative; }

    /* ── Long press menu ── */
    .lp-menu {
      position: fixed; z-index: 300;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 6px; min-width: 160px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    .lp-menu.show { display: block; }
    .lp-item {
      padding: 10px 14px; font-size: 0.82rem; cursor: pointer;
      border-radius: 8px; display: flex; align-items: center; gap: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .lp-item:active { background: var(--border); }
    .lp-item.danger { color: var(--red); }

    /* ── Edit modal ── */
    .edit-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 250; opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .edit-modal-overlay.show { opacity: 1; pointer-events: all; }
    .edit-modal-sheet {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px 20px 0 0; padding: 24px 20px 32px;
      width: 100%; max-width: 480px;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
      display: flex; flex-direction: column; gap: 12px;
    }
    .edit-modal-overlay.show .edit-modal-sheet { transform: translateY(0); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 10px 20px;
      font-size: 0.8rem; color: var(--text); white-space: nowrap;
      transition: transform 0.3s ease; z-index: 100; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--red); color: var(--red); }
    .toast.success { border-color: var(--accent); color: var(--accent); }
  </style>
</head>

<div class="toast" id="toast"></div>

<script>
  // ══════════════════════════════════════════
  // PeerJS P2P 通信
  // ══════════════════════════════════════════
  let peer = null;
  let hostConn = null;       // 送信側→ホストへの接続
  let guestConns = [];       // ホスト側→複数ゲストの接続
  let myPeerId = null;
  let isHost = false;

  // localStorage ストレージ
  const LS_SONGS    = 'ap_songs';
  const LS_QUEUE    = 'ap_queue';
  const LS_CURRENT  = 'ap_current';

  function lsGet(key) { try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; } }
  function lsSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  // songs: { id: {url, title, cat, addedAt} }
  // queue: [ {id, url, ts} ]
  // current: {url, ts}

  function getSongs() { return lsGet(LS_SONGS) || {}; }
  function getQueue() { return lsGet(LS_QUEUE) || []; }

  function saveSongs(s) { lsSet(LS_SONGS, s); songs = s; renderPlaylist(); renderManage(); }
  function saveQueue(q) {
    lsSet(LS_QUEUE, q);
    queueData = q.reduce((acc, item) => { acc[item.id] = item; return acc; }, {});
    renderQueue();
    if (isReceiver && q.length > 0 && !isPlayingNow) {
      const item = q[0];
      playFromQueue(item.id, item.url);
    }
  }

  // ── PeerJS: ホスト初期化 ──
  function initHost() {
    isHost = true;
    const savedId = localStorage.getItem('ap_host_id');
    peer = new Peer(savedId || undefined, { debug: 0 });
    peer.on('open', id => {
      myPeerId = id;
      localStorage.setItem('ap_host_id', id);
      document.getElementById('statusDot').className = 'status-dot live';
      generateQR();
      log(`ホスト起動: ${id}`, 'ok');
    });
    peer.on('connection', conn => {
      guestConns.push(conn);
      log(`ゲスト接続: ${conn.peer}`, 'ok');
      conn.on('data', data => handleMessage(data));
      conn.on('close', () => {
        guestConns = guestConns.filter(c => c !== conn);
        log(`ゲスト切断: ${conn.peer}`);
      });
      conn.on('error', e => log(`ゲストエラー: ${e}`, 'err'));
    });
    peer.on('error', e => {
      log(`PeerエラーHost: ${e.type}`, 'err');
      // ID衝突時はランダムIDで再試行
      if (e.type === 'unavailable-id') {
        localStorage.removeItem('ap_host_id');
        initHost();
      }
    });
  }

  // ── PeerJS: ゲスト接続 ──
  function connectToHost(hostId) {
    isHost = false;
    peer = new Peer({ debug: 0 });
    peer.on('open', id => {
      myPeerId = id;
      log(`ゲスト起動: ${id}`, 'ok');
      hostConn = peer.connect(hostId, { reliable: true });
      hostConn.on('open', () => {
        log(`ホスト接続成功: ${hostId}`, 'ok');
        document.getElementById('statusDot').className = 'status-dot live';
        showToast('✓ 接続しました！', 'success');
      });
      hostConn.on('data', data => handleMessage(data));
      hostConn.on('close', () => {
        log('ホスト切断', 'err');
        document.getElementById('statusDot').className = 'status-dot';
        showToast('接続が切れました', 'error');
      });
      hostConn.on('error', e => log(`ホスト接続エラー: ${e}`, 'err'));
    });
    peer.on('error', e => log(`PeerエラーGuest: ${e.type}`, 'err'));
  }

  // ── メッセージ処理 ──
  function handleMessage(data) {
    log(`受信: ${data.type}`, 'info');
    if (data.type === 'enqueue') {
      // ゲストから曲追加
      const q = getQueue();
      const already = q.some(i => i.url === data.url);
      if (already) return;
      const newItem = { id: Date.now() + Math.random().toString(36).slice(2), url: data.url, ts: Date.now() };
      q.push(newItem);
      saveQueue(q);
      // 全ゲストに同期
      broadcast({ type: 'queue_sync', queue: q });
    } else if (data.type === 'queue_sync') {
      // ホストからキュー同期
      saveQueue(data.queue);
    } else if (data.type === 'current_sync') {
      // ホストから再生中同期
      lsSet(LS_CURRENT, data.current);
      if (data.current) updateNowPlaying(data.current.url);
    } else if (data.type === 'songs_sync') {
      // ホストからプレイリスト同期
      saveSongs(data.songs);
    }
  }

  // ── ブロードキャスト（ホスト→全ゲスト）──
  function broadcast(data) {
    guestConns.forEach(c => { try { c.send(data); } catch(e) {} });
  }

  // ── ゲストからホストへ送信 ──
  function sendToHost(data) {
    if (hostConn && hostConn.open) {
      hostConn.send(data);
    }
  }

  let songs = {};
  let queueData = {};
  let currentCat = 'ALL';
  let isReceiver = false;
  let currentUrl = null;
  let qrGenerated = false;

  // ── Helpers ──
  function extractVideoId(url) {
    try {
      const u = new URL(url.trim());
      if (u.hostname.includes('youtube.com') && u.searchParams.get('v')) return u.searchParams.get('v');
      if (u.hostname === 'youtu.be') return u.pathname.slice(1).split('?')[0];
      if (u.pathname.includes('/shorts/')) return u.pathname.split('/shorts/')[1].split('/')[0];
    } catch(e) {}
    return null;
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' '+type : '');
    setTimeout(() => t.className = 'toast', 2500);
  }

  // ── Tab switch ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === name);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
  }
  window.switchTab = switchTab;

  // ── Mode ──
  function setMode(receiver) {
    isReceiver = receiver;
    localStorage.setItem('ap_mode', receiver ? 'receiver' : 'sender');
    const toggle = document.getElementById('modeToggle');
    const dot = document.getElementById('statusDot');
    document.querySelectorAll('[data-receiver]').forEach(el => {
      el.style.display = receiver ? '' : 'none';
    });
    if (receiver) {
      toggle.textContent = '📱 送信モード';
      toggle.className = 'mode-toggle receiver';
      switchTab('receiver');
      // ホストとして起動
      if (!peer) initHost();
    } else {
      toggle.textContent = '🚗 受信モード';
      toggle.className = 'mode-toggle';
      dot.className = 'status-dot';
      switchTab('send');
      // ゲストとして接続（URLにhost=があれば）
      const hostId = new URLSearchParams(location.search).get('host');
      if (hostId && !peer) connectToHost(hostId);
    }
  }

  function toggleMode() { setMode(!isReceiver); }
  window.toggleMode = toggleMode;

  // ── QR ──
  function generateQR() {
    if (!myPeerId) { setTimeout(generateQR, 500); return; }
    const el = document.getElementById('qrcode');
    el.innerHTML = '';
    const base = location.href.split('?')[0];
    const url = `${base}?host=${myPeerId}`;
    new QRCode(el, { text: url, width: 160, height: 160, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M });
  }

  // ── Add to queue (sender) ──
  function enqueue(url) {
    if (!extractVideoId(url)) { showToast('YouTubeのURLを入力してください', 'error'); return false; }
    const q = getQueue();
    const already = q.some(i => i.url === url);
    if (already) { showToast('すでにキューにあります', 'error'); return false; }
    const pos = q.length + 1;

    if (isHost) {
      // ホスト：直接追加
      const newItem = { id: Date.now() + Math.random().toString(36).slice(2), url, ts: Date.now() };
      q.push(newItem);
      saveQueue(q);
      broadcast({ type: 'queue_sync', queue: q });
    } else {
      // ゲスト：ホストに送信
      if (hostConn && hostConn.open) {
        sendToHost({ type: 'enqueue', url });
        showToast(`⚡ ${pos}番目に追加しました！`, 'success');
      } else {
        // 未接続の場合はローカルに追加
        const newItem = { id: Date.now() + Math.random().toString(36).slice(2), url, ts: Date.now() };
        q.push(newItem);
        saveQueue(q);
      }
    }
    showToast(`⚡ ${pos}番目に追加しました！`, 'success');
    return true;
  }

  function sendUrl() {
    const input = document.getElementById('sendUrl');
    const url = input.value.trim();
    if (enqueue(url)) input.value = '';
  }
  window.sendUrl = sendUrl;

  // ── Playlist kick → enqueue ──
  function kick(url, elId) {
    if (enqueue(url)) {
      const el = document.getElementById(elId);
      if (el) { el.classList.add('kicking'); setTimeout(() => el.classList.remove('kicking'), 400); }
    }
  }
  window.kick = kick;

  // ── Queue: play item ──
  function playFromQueue(id, url) {
    currentUrl = url;
    isPlayingNow = true;
    // キューから削除
    const q = getQueue().filter(i => i.id !== id);
    saveQueue(q);
    if (isHost) broadcast({ type: 'queue_sync', queue: q });
    // current同期
    const cur = { id, url, ts: Date.now() };
    lsSet(LS_CURRENT, cur);
    if (isHost) broadcast({ type: 'current_sync', current: cur });
    addToHistory(url);
    if (isReceiver) openUrl(url);
  }
  window.playFromQueue = playFromQueue;

  // Track if user has interacted (needed for autoplay policy)
  let userInteracted = false;
  document.addEventListener('touchstart', () => { userInteracted = true; }, { once: true });
  document.addEventListener('click', () => { userInteracted = true; }, { once: true });

  // YT IFrame Player API
  let isPlayingNow = false;
  let ytPlayer = null;
  let ytPlayerReady = false;
  let skipTimer = null;

  function onPlayerStateChange(event) {
    const s = event.data;
    // event.targetがプレイヤー本体。ここから時間や長さを取得する
    const playerTarget = event.target; 

    isPlayingNow = (s === YT.PlayerState.PLAYING);

    if (!isReceiver) return;

    if (s === YT.PlayerState.PLAYING) {
      if (skipTimer) clearInterval(skipTimer);
      
      // 0.5秒おきに監視するタイマー
      skipTimer = setInterval(() => {
        // APIの仕様通り、playerTargetから時間を取得する
        if (playerTarget && typeof playerTarget.getCurrentTime === 'function') {
          const cur = playerTarget.getCurrentTime();
          const dur = playerTarget.getDuration();
          
          // 残り1.5秒を切ったら先回りスキップ
          if (dur > 0 && (dur - cur) < 1.5) {
            console.log("先回りスキップ実行！");
            clearInterval(skipTimer);
            skipNext();
          }
        }
      }, 500);
      
    } else {
      if (skipTimer) {
        clearInterval(skipTimer);
        skipTimer = null;
      }
    }

    if (s === YT.PlayerState.ENDED) {
      console.log("動画終了スキップ実行！");
      skipNext();
    }
  }

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('ytIframe', {
      height: '100%', width: '100%',
      playerVars: { autoplay: 1, playsinline: 1, rel: 0, modestbranding: 1 },
      events: {
        onReady: (e) => {
          ytPlayerReady = true;
        },
        onStateChange: onPlayerStateChange,
        onError: (e) => {
          console.warn('YT Error:', e.data);
          skipNext(); 
        }
      }
    });
  };

  function onVideoEnded() {
    isPlayingNow = false;
    currentUrl = null;
    const arr = Object.entries(queueData).sort((a,b) => a[1].ts - b[1].ts);
    if (arr.length > 0) {
      const [nid, nitem] = arr[0];
      playFromQueue(nid, nitem.url);
    } else if (Object.keys(songs).length > 0) {
      autoShuffleQueue();
    }
  }

  function autoShuffleQueue() {
    const arr = Object.entries(songs).map(([id,v]) => ({id,...v}));
    if (arr.length === 0) return;
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    const q = [];
    arr.forEach(s => {
      if (extractVideoId(s.url)) q.push({ id: Date.now() + Math.random().toString(36).slice(2), url: s.url, ts: Date.now() });
    });

  function extractColor(imgUrl) {
    return new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = 16; canvas.height = 9;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, 16, 9);
          const data = ctx.getImageData(0, 0, 16, 9).data;
          let r = 0, g = 0, b = 0, count = 0;
          for (let i = 0; i < data.length; i += 4) {
            const pr = data[i], pg = data[i+1], pb = data[i+2];
            // skip near-black and near-white pixels
            const brightness = (pr + pg + pb) / 3;
            if (brightness < 30 || brightness > 220) continue;
            r += pr; g += pg; b += pb; count++;
          }
          if (count === 0) { resolve(null); return; }
          resolve({ r: Math.round(r/count), g: Math.round(g/count), b: Math.round(b/count) });
        } catch(e) { resolve(null); }
      };
      img.onerror = () => resolve(null);
      img.src = imgUrl;
    });
  }

  function applyBgTint(color) {
    const isLight = document.body.classList.contains('light');
    const alpha = isLight ? 0.12 : 0.18;

      ? `rgb(${220 + Math.round((r-128)*0.15)}, ${220 + Math.round((g-128)*0.15)}, ${220 + Math.round((b-128)*0.15)})`
      : `rgb(${Math.round(r * alpha)}, ${Math.round(g * alpha)}, ${Math.round(b * alpha)})`;
  }

    el.innerHTML = arr.map((item, i) => {

      return `
        <div class="queue-item ${i===0?'current':''}" draggable="true" data-id="${item.id}" data-ts="${item.ts}">
          <div class="queue-num">${i===0 ? '▶' : i+1}</div>

          </div>
        </div>
      `;
    }).join('');

    // drag reorder
    let dragSrcId = null;
    el.querySelectorAll('.queue-item').forEach(row => {
      row.addEventListener('dragstart', e => { dragSrcId = row.dataset.id; row.classList.add('dragging'); });
      row.addEventListener('dragend', () => row.classList.remove('dragging'));
      row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', e => {
        e.preventDefault(); row.classList.remove('drag-over');
        if (!dragSrcId || dragSrcId === row.dataset.id) return;
        // swap timestamps to reorder
        const srcTs = arr.find(a => a.id === dragSrcId)?.ts;
        const dstTs = parseInt(row.dataset.ts);
        if (srcTs !== undefined) {
          const q2 = getQueue();
          const srcItem = q2.find(i => i.id === dragSrcId);
          if (srcItem) { srcItem.ts = dstTs - 1; saveQueue(q2); if (isHost) broadcast({ type: 'queue_sync', queue: q2 }); }
        }
      });
    });
  }

        if (isDriving) setTimeout(requestWakeLock, 1000);

  }

  // ── Swipe + Multi-tap gestures on now-hero ──
  (function() {
    const hero = document.querySelector('.now-hero');
    if (!hero) return;
    let sx = 0, sy = 0, moved = false;
    const SWIPE_THRESHOLD = 60;

    // Multi-tap detection
    let tapCount = 0;
    let tapTimer = null;
    const TAP_DELAY = 300; // ms to wait for more taps

    hero.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
      moved = false;
    }, { passive: true });

    hero.addEventListener('touchmove', () => {
      moved = true;
    }, { passive: true });

    hero.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      const absDx = Math.abs(dx), absDy = Math.abs(dy);

      // swipe判定（動きが大きい場合）
      if (moved && (absDx > SWIPE_THRESHOLD || absDy > SWIPE_THRESHOLD)) {
        if (absDy > SWIPE_THRESHOLD && absDy > absDx * 1.5 && dy < 0) {
          if (currentUrl) { showGesture('⬆️'); openSaveModal(currentUrl); }
        } else if (absDx > SWIPE_THRESHOLD && absDx > absDy * 1.5) {
          if (dx < 0) { showGesture('⏭'); skipNext(); }
          else { showGesture('⏮'); playPrev(); }
        }
        tapCount = 0;
        clearTimeout(tapTimer);
        return;
      }

      // タップ判定（動きが小さい場合）
      if (!moved || (absDx < 15 && absDy < 15)) {
        tapCount++;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => {
          if (tapCount === 2) {
            showGesture('⏭');
            skipNext();
          } else if (tapCount >= 3) {
            showGesture('⏮');
            playPrev();
          }
          // 1回タップは何もしない（誤操作防止）
          tapCount = 0;
        }, TAP_DELAY);
      }
    }, { passive: true });

    function showGesture(emoji) {
      const el = document.getElementById('swipeHint');
      el.textContent = emoji;
      el.style.opacity = '1';
      setTimeout(() => el.style.opacity = '0', 700);
    }
  })();

  // ── Play previous from history ──
  function playPrev() {
    // history[0] is current, history[1] is previous
    if (history.length < 2) { showToast('履歴がありません', 'error'); return; }
    const prev = history[1];
    enqueue(prev.url);
    skipNext();
    showToast('⏮ 前の曲', 'success');
  }
  window.playPrev = playPrev;

  // Paste auto-send
  document.getElementById('sendUrl').addEventListener('paste', e => {
    setTimeout(() => {
      const val = document.getElementById('sendUrl').value.trim();
      if (extractVideoId(val)) { enqueue(val); document.getElementById('sendUrl').value=''; }
    }, 50);
  });
  document.getElementById('sendUrl').addEventListener('keydown', e => {
    if (e.key==='Enter') sendUrl();
  });

  // Init
  // Init state from localStorage
  initState();

  // P2P mode init
  const urlParams = new URLSearchParams(location.search);
  const hostIdParam = urlParams.get('host');
  const urlMode = urlParams.get('mode');
  const savedMode = localStorage.getItem('ap_mode');

  if (hostIdParam) {
    // QRコードから来たゲスト
    setMode(false);
  } else if (savedMode === 'receiver' || urlMode === 'receiver') {
    setMode(true);
  } else {
    setMode(false);
  }

  // Apply saved theme
  const savedTheme = localStorage.getItem('ap_theme');
  if (savedTheme === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '🌙';
    document.querySelector('meta[name="theme-color"]').content = '#f4f4f0';
  }

  // PWA Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

</script>
</body>
</html>
